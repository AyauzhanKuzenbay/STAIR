[MODE]
IsTraining = True
IsEvaluating = True

[DIRECTORY]
# Replace with your SPA preprocessing output paths.
TrainingXPath   = /path/to/data/training_x.npy
TrainingYPath   = /path/to/data/training_y.npy
ValidationXPath = /path/to/data/validation_x.npy
ValidationYPath = /path/to/data/validation_y.npy
TestGTPath      = /path/to/data/db_drop40.npy
TestQPath       = /path/to/data/q_drop40.npy
TopKIDPath      = /path/to/data/topk_id.npy
TopKWeightsPath = /path/to/data/topk_weight.npy
OutputDirectory = MODEL_OUT_STAIR

[TRAINING]
ModelPath     = MODEL_OUT_STAIR/cp.h5
BatchSize     = 32
TripletMargin = 0.5
Epochs        = 100
Patience      = 5
# λ1 (reconstruction) and λ2 (pattern) from Eq. (25)
LossWeights   = [1.0, 1.0, 0.5]

[MODEL]
GRUCellSize       = 256
NumGRULayers      = 3
GRUDropoutRatio   = 0.3
EmbeddingSize     = 256
EmbeddingVocabSize = None
TrajReprSize      = 256
Bidirectional     = True
UseAttention      = True

[PREDICTION]
KS               = [1, 5, 10, 50]
PredictBatchSize = 1024
UseMeanRank      = True

[GPU]
GPUUsed   = [0]
GPUMemory = 15000
