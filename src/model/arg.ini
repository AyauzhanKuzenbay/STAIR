[MODE]
IsTraining = True
IsEvaluating = True

[DIRECTORY]
# Replace these with your SPA output paths.
TrainingXPath   = /path/to/spa/output/1_training_x.npy
TrainingYPath   = /path/to/spa/output/1_training_y.npy
ValidationXPath = /path/to/spa/output/1_validation_x.npy
ValidationYPath = /path/to/spa/output/1_validation_y.npy
TestGTPath      = /path/to/spa/output/1_db_drop40.npy
TestQPath       = /path/to/spa/output/1_q_drop40.npy
TopKIDPath      = /path/to/spa/output/1_topk_id.npy
TopKWeightsPath = /path/to/spa/output/1_topk_weight.npy

OutputDirectory = model_output

[TRAINING]
# Set ModelPath only if resuming training from a checkpoint
ModelPath =
BatchSize = 32
TripletMargin = 0.5
Epochs = 100
Patience = 2
LossWeights = [1, 1, 1]

[MODEL]
GRUCellSize = 256
NumGRULayers = 3
GRUDropoutRatio = 0.3
EmbeddingSize = 256
EmbeddingVocabSize = None
TrajReprSize = 256
Bidirectional = True
UseAttention = True

[PREDICTION]
KS = [1, 5, 10, 50]
PredictBatchSize = 1024
UseMeanRank = True

[GPU]
GPUUsed = [0]
GPUMemory = 15000
