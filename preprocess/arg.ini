[MODE]
ProcessTrainVal = True
ProcessTest = False

[GENERAL]
# Path to your input trajectory CSV file
InputFilePath = /path/to/your/dataset.csv
OutputDirectory = chengdu_data_10000
DatasetMode = didi

[PRUNING]
